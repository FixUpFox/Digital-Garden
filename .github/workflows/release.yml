name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate version numbers
        run: |
          VERSION=${GITHUB_REF_NAME#v}

          check() {
            local label="$1"
            local file="$2"
            local pattern="$3"
            local found
            found=$(grep -oP "$pattern" "$file" | head -1)
            if [ "$found" != "$VERSION" ]; then
              echo "::error file=${file}::${label} version mismatch — expected ${VERSION}, found '${found}'"
              exit 1
            fi
            echo "${label}: ${found} ✓"
          }

          check "digital-garden.php header"   digital-garden.php  '(?<=\* Version: )[\d.]+'
          check "DIGITAL_GARDEN_VERSION"       digital-garden.php  "(?<=DIGITAL_GARDEN_VERSION', ')[\d.]+"
          check "readme.md Stable tag"         readme.md           '(?<=\*\*Stable tag\*\*\s{8}\| )[\d.]+'
          check "readme.txt Stable tag"        readme.txt          '(?<=Stable tag: )[\d.]+'

      - name: Build plugin zip
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          PLUGIN_SLUG="digital-garden"
          ZIP_NAME="${PLUGIN_SLUG}-${VERSION}.zip"

          # Copy plugin files, excluding everything in .distignore
          rsync -r \
            --exclude-from=".distignore" \
            --exclude=".git" \
            . /tmp/${PLUGIN_SLUG}/

          # Zip with the plugin slug as the root folder
          cd /tmp
          zip -r "${ZIP_NAME}" "${PLUGIN_SLUG}/"

          echo "ZIP_PATH=/tmp/${ZIP_NAME}" >> $GITHUB_ENV
          echo "ZIP_NAME=${ZIP_NAME}" >> $GITHUB_ENV
          echo "VERSION=${VERSION}" >> $GITHUB_ENV

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ env.VERSION }}"
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: ${{ env.ZIP_PATH }}
